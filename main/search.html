<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search</title>
  <link rel="stylesheet" href="https://initnexus.github.io/Core/styling/core.css">
  <link id="nb-theme-stylesheet" rel="stylesheet" href="https://initnexus.github.io/Core/styling/themes/dark.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100dvh;
    }

    body {
      display: flex;
      flex-direction: column;
      background: radial-gradient(ellipse at 50% 60%, rgba(100, 60, 180, 0.18) 0%, transparent 70%),
                  linear-gradient(160deg, #111116 0%, #1a1420 50%, #0f0f14 100%);
      background-color: #111116;
      background-attachment: fixed;
    }

    .navbar {
      background-color: rgba(26, 20, 32, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      left: 0;
      right: 0;
    }

    .navbar-brand {
      color: #ffffff;
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      font-family: var(--font-display);
      text-decoration: none;
    }

    .nav-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      background: none;
      border: none;
      cursor: pointer;
      transition: background-color var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
      padding: 0;
    }

    .nav-icon-btn:hover {
      background-color: rgba(255, 255, 255, 0.08);
    }

    .nav-icon-btn img {
      width: 22px;
      height: 22px;
      display: block;
    }

    .sheet {
      background-color: #1e1a2e;
      border-top: 1px solid rgba(255, 255, 255, 0.09);
    }

    .sheet-title {
      color: #ffffff;
    }

    .sheet-handle {
      cursor: pointer;
      margin: var(--spacing-3) auto var(--spacing-1);
    }

    .sheet-close-bar {
      display: flex;
      justify-content: center;
      padding: var(--spacing-3) 0 0;
      cursor: pointer;
    }

    .sheet-close-bar-inner {
      width: 36px;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.3);
      border-radius: var(--radius-full);
    }

    .sheet-menu-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
      padding: var(--spacing-3) var(--spacing-4);
      border-bottom: none;
      cursor: pointer;
      transition: background-color var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      text-decoration: none;
      border-radius: 10px;
      margin: 0 var(--spacing-2);
    }

    .sheet-menu-item:last-child {
      border-bottom: none;
    }

    .sheet-menu-item:hover {
      background-color: rgba(255, 255, 255, 0.08);
    }

    .sheet-menu-item img {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: block;
    }

    .sheet-menu-item span {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: #ffffff;
      font-family: var(--font-ui);
    }

    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 499;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .services-submenu {
      display: none;
      flex-direction: column;
      background-color: rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      margin: 0 var(--spacing-2) var(--spacing-1);
      padding: var(--spacing-1);
    }

    .services-submenu.open {
      display: flex;
    }

    .submenu-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
      padding: var(--spacing-3) var(--spacing-4);
      cursor: pointer;
      transition: background-color var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      text-decoration: none;
      border-radius: 10px;
    }

    .submenu-item:hover {
      background-color: rgba(255, 255, 255, 0.08);
    }

    .submenu-item img {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: block;
    }

    .submenu-item span {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: #ffffff;
      font-family: var(--font-ui);
    }

    .submenu-divider {
      height: 1px;
      background-color: rgba(255, 255, 255, 0.09);
      margin: var(--spacing-1) var(--spacing-2);
    }

    .submenu-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
      padding: var(--spacing-3) var(--spacing-4);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      border-radius: 10px;
    }

    .submenu-header:hover {
      background-color: rgba(255, 255, 255, 0.08);
    }

    .submenu-header img {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: block;
    }

    .submenu-header span {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: #ffffff;
      font-family: var(--font-ui);
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
    }

    *::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    *::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: var(--radius-full);
    }

    .site-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.09);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-3) var(--spacing-4);
    }

    .site-footer p {
      margin: 0;
      font-size: var(--text-sm);
      color: rgba(255, 255, 255, 0.4);
    }

    .page-heading {
      text-align: center;
      padding: var(--spacing-6) var(--spacing-4) 0;
    }

    .page-heading h3 {
      margin: 0;
      color: #ffffff;
    }

    .page-content {
      flex: 1;
      margin: var(--spacing-4);
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: var(--radius-lg);
      padding: var(--spacing-4);
    }

    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
      width: 100%;
      box-sizing: border-box;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: var(--spacing-3) var(--spacing-4);
      transition: border-color var(--transition-fast);
    }

    .search-input-wrap:focus-within {
      border-color: rgba(155, 127, 232, 0.5);
    }

    .search-input-wrap img {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: block;
      opacity: 0.4;
    }

    .search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #ffffff;
      font-size: var(--text-sm);
      font-family: var(--font-ui);
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .search-results {
      display: none;
      flex-direction: column;
      margin-top: var(--spacing-3);
    }

    .search-results.visible {
      display: flex;
    }

    .search-result {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
      padding: var(--spacing-3) var(--spacing-3);
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: background-color var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }

    .search-result:hover {
      background-color: rgba(255, 255, 255, 0.07);
    }

    .search-result-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: block;
    }

    .search-result-main {
      flex: 1;
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      min-width: 0;
    }

    .search-result-name {
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      color: #ffffff;
      font-family: var(--font-ui);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result-platform {
      font-size: var(--text-xs);
      color: rgba(255, 255, 255, 0.4);
      font-family: var(--font-ui);
      white-space: nowrap;
    }

    .search-result-type {
      font-size: var(--text-xs);
      color: rgba(255, 255, 255, 0.35);
      font-family: var(--font-ui);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-no-results {
      display: none;
      padding: var(--spacing-4) 0;
      text-align: center;
      font-size: var(--text-sm);
      color: rgba(255, 255, 255, 0.3);
      font-family: var(--font-ui);
    }

    .search-no-results.visible {
      display: block;
    }

    @media (max-width: 767px) {
      .navbar-brand {
        display: none;
      }
      .navbar-actions {
        display: flex;
        justify-content: space-evenly;
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <span class="navbar-brand">NexusByte SMM</span>
    <div class="navbar-actions">
      <a href="https://initnexus.github.io/NexusByte-SMM/main/home.html" class="nav-icon-btn">
        <img src="https://initnexus.github.io/Core/media/icons/home.png" alt="">
      </a>
      <a href="https://initnexus.github.io/NexusByte-SMM/main/search.html" class="nav-icon-btn">
        <img src="https://initnexus.github.io/Core/media/icons/search.png" alt="">
      </a>

  <div class="page-heading">

    <div class="search-no-results" id="search-no-results">No results found.</div>

  <div id="sheet-overlay" class="sheet-overlay" data-sheet-close="sheet-menu"></div>

          </div>

          <a href="https://initnexus.github.io/NexusByte-SMM/main/services/facebook.html" class="submenu-item">

          </a>
          <a href="https://initnexus.github.io/NexusByte-SMM/main/services/instagram.html" class="submenu-item">
            <img src="https://initnexus.github.io/Core/media/icons/instagram.png" alt="">
            <span>Instagram</span>

          <a href="https://initnexus.github.io/NexusByte-SMM/main/services/threads.html" class="submenu-item">

            <span>WhatsApp</span>

          <a href="https://initnexus.github.io/NexusByte-SMM/main/services/telegram.html" class="submenu-item">
            <img src="https://initnexus.github.io/Core/media/icons/telegram.png" alt="">
            <span>Telegram</span>
          </a>
          <a href="https://initnexus.github.io/NexusByte-SMM/main/services/x.html" class="submenu-item">

            <span>X</span>

          </a>
          <a href="https://initnexus.github.io/NexusByte-SMM/main/services/discord.html" class="submenu-item">

            <span>Discord</span>

          <a href="https://initnexus.github.io/NexusByte-SMM/main/services/youtube.html" class="submenu-item">

  <script src="https://initnexus.github.io/Core/scripts/core.js"></script>
  <script>
    const SEARCH_DATA_URL = 'https://initnexus.github.io/NexusByte-SMM/assets/data/indexing.json';

    let searchData = null;

    async function loadSearchData() {
      try {
        const res = await fetch(SEARCH_DATA_URL);
        searchData = await res.json();
      } catch (e) {
        searchData = { services: [], pages: [] };
      }
    }

    function getServiceNameCounts(results) {
      const counts = {};
      results.forEach(r => {
        if (r._type === 'Service') {
          counts[r.name] = (counts[r.name] || 0) + 1;
        }
      });
      return counts;
    }

    function runSearch(query) {
      const resultsEl = document.getElementById('search-results');
      const noResultsEl = document.getElementById('search-no-results');
      resultsEl.innerHTML = '';

      if (!query.trim()) {
        resultsEl.classList.remove('visible');
        noResultsEl.classList.remove('visible');
        return;
      }

      const q = query.toLowerCase();
      const matched = [];

      (searchData.services || []).forEach(item => {
        if (
          item.name.toLowerCase().includes(q) ||
          item.platform.toLowerCase().includes(q)
        ) {
          matched.push({ ...item, _type: 'Service' });
        }
      });

      (searchData.pages || []).forEach(item => {
        if (item.name.toLowerCase().includes(q)) {
          matched.push({ ...item, _type: 'Page' });
        }
      });

      if (matched.length === 0) {
        resultsEl.classList.remove('visible');
        noResultsEl.classList.add('visible');
        return;
      }

      noResultsEl.classList.remove('visible');

      const serviceNameCounts = getServiceNameCounts(matched);

      matched.forEach(item => {
        const a = document.createElement('a');
        a.className = 'search-result';
        a.href = item.url;

        const icon = document.createElement('img');
        icon.className = 'search-result-icon';
        icon.src = item.icon_url;
        icon.alt = '';

        const main = document.createElement('div');
        main.className = 'search-result-main';

        const name = document.createElement('span');
        name.className = 'search-result-name';
        name.textContent = item.name;

        main.appendChild(name);

        if (item._type === 'Service' && serviceNameCounts[item.name] > 1) {
          const platform = document.createElement('span');
          platform.className = 'search-result-platform';
          platform.textContent = item.platform;
          main.appendChild(platform);
        }

        const type = document.createElement('span');
        type.className = 'search-result-type';
        type.textContent = item._type;

        a.appendChild(icon);
        a.appendChild(main);
        a.appendChild(type);
        resultsEl.appendChild(a);
      });

      resultsEl.classList.add('visible');
    }

    document.getElementById('search-input').addEventListener('input', e => {
      runSearch(e.target.value);
    });

    loadSearchData();
  </script>
</body>
